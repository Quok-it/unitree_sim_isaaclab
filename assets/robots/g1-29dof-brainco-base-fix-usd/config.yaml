asset_path: /home/quokka/unitree/unitree_ros/robots/g1_with_brainco_hand/g1_29dof_mode_15_brainco_hand.urdf
usd_dir: /home/quokka/unitree_sim_isaaclab/assets/robots/g1-29dof-brainco-base-fix-usd
usd_file_name: g1_29dof_with_brainco.usd
force_usd_conversion: true
make_instanceable: true
fix_base: true
root_link_name: null
link_density: 0.0

# TODO(aycho): decide collision strategy for fingers.
#   convex_hull       — fastest, but fingertips lose curvature → poor pinch grasps
#   convex_decomposition — better fidelity for opposed-thumb grasps, ~3-5x slower per step
#   sdf               — best for thin/concave geometry, requires PhysX SDF support
collider_type: convex_hull

# TODO(aycho): mimic joints.
#   The URDF has 61 revolute joints but unitree.py only actuates 6 per hand.
#   The unactuated phalanxes (distal_joint, tip_joint) must follow proximals via <mimic>.
#   - false  → preserve URDF mimic equations (coupled finger curl, like a tendon)
#   - true   → every phalanx becomes an independent DOF (only correct if you plan to
#              actuate every joint individually — you don't, per unitree.py:1426-1440)
convert_mimic_joints_to_normal_joints: false

merge_fixed_joints: false
self_collision: false
replace_cylinders_with_capsules: false
collision_from_visuals: false

joint_drive:
  drive_type: force
  target_type: position
  gains:
    stiffness: 100.0
    damping: 1.0
